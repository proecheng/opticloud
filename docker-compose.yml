# OptiCloud — 本地开发栈（Story 0.2）
# 5 容器：Postgres + Redis + Vault dev + MinIO + LocalStack S3
# 启动：docker-compose up -d
# 验证：docker-compose ps 全 healthy + psql 显示初始表

services:
  postgres:
    image: postgres:16-alpine
    container_name: opticloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opticloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opticloud_dev}
      POSTGRES_DB: ${POSTGRES_DB:-opticloud_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/local-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opticloud -d opticloud_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opticloud-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  outbox-relayer:
    build:
      context: .
      dockerfile: apps/outbox-relayer/Dockerfile
    container_name: opticloud-outbox-relayer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://opticloud:opticloud_dev@postgres:5432/opticloud_dev  # pragma: allowlist secret
      REDIS_URL: redis://redis:6379
      HEALTH_PORT: 9101
    ports:
      - "9101:9101"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9101/healthz', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

  vault:
    image: hashicorp/vault:1.18
    container_name: opticloud-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-opticloud-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: opticloud-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-opticloud}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-opticloud_dev}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3.7
    container_name: opticloud-localstack
    environment:
      SERVICES: s3,sqs,kms
      DEBUG: 0
      AWS_DEFAULT_REGION: cn-north-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  localstack_data:
