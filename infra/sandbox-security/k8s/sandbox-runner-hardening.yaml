apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-runner
  namespace: prod-ai
  labels:
    app: sandbox-runner
    opticloud.io/component: sandbox-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-runner
  template:
    metadata:
      labels:
        app: sandbox-runner
        opticloud.io/component: sandbox-runner
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        appArmorProfile:
          type: Localhost
          localhostProfile: opticloud-sandbox-runner
      containers:
        - name: sandbox-runner
          image: opticloud/sandbox-runner@sha256:1111111111111111111111111111111111111111111111111111111111111111
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            appArmorProfile:
              type: Localhost
              localhostProfile: opticloud-sandbox-runner
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: sandbox-results
              mountPath: /sandbox/results
      volumes:
        - name: sandbox-results
          emptyDir:
            medium: Memory
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-runner-deny-all-egress
  namespace: prod-ai
spec:
  podSelector:
    matchLabels:
      app: sandbox-runner
  policyTypes:
    - Egress
  egress: []
