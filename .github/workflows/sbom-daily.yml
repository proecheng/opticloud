# Daily SBOM scan — RE2-9 + CRG6 supply chain alert
# Runs every day at 02:00 UTC; checks against fresh CVE DB
# Creates Linear ticket for any dependency drift

name: sbom-daily

on:
  schedule:
    - cron: '0 2 * * *'  # 02:00 UTC daily
  workflow_dispatch:  # manual trigger

permissions:
  contents: read
  issues: write  # for Linear ticket creation via GitHub issue bridge

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service]  # Expand as services come online
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.14.2

      - name: Set up grype (CVE scanner)
        uses: anchore/scan-action/download-grype@v3

      - name: Set env
        run: |
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Rebuild service image
        run: |
          docker build \
            -f apps/${{ matrix.service }}/Dockerfile \
            -t opticloud/${{ matrix.service }}:scan-${{ env.TODAY }} \
            --build-arg GIT_SHA=${{ env.GIT_SHA }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            .

      - name: Generate today's SBOM
        run: |
          mkdir -p infra/sbom-history/${{ env.TODAY }}
          syft opticloud/${{ matrix.service }}:scan-${{ env.TODAY }} -o spdx-json \
            > infra/sbom-history/${{ env.TODAY }}/${{ matrix.service }}.spdx.json

      - name: Scan SBOM for CVEs (grype, NVD + GHSA)
        run: |
          grype sbom:infra/sbom-history/${{ env.TODAY }}/${{ matrix.service }}.spdx.json \
            -o json \
            --fail-on high \
            > infra/sbom-history/${{ env.TODAY }}/${{ matrix.service }}.cve-report.json \
            || CVE_FAIL=$?
          if [ "${CVE_FAIL:-0}" = "1" ]; then
            echo "::error::High or critical CVE detected in ${{ matrix.service }}"
            jq '.matches | map({id: .vulnerability.id, sev: .vulnerability.severity, pkg: .artifact.name})' \
              infra/sbom-history/${{ env.TODAY }}/${{ matrix.service }}.cve-report.json
          fi

      - name: Diff vs yesterday
        run: |
          OLD=infra/sbom-history/${{ env.YESTERDAY }}/${{ matrix.service }}.spdx.json
          NEW=infra/sbom-history/${{ env.TODAY }}/${{ matrix.service }}.spdx.json
          if [ -f "$OLD" ]; then
            python scripts/sbom_diff.py --old "$OLD" --new "$NEW" || true
          else
            echo "No yesterday SBOM — skip diff (first daily scan)"
          fi

      - name: Upload SBOM + CVE report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-sbom-${{ matrix.service }}-${{ env.TODAY }}
          path: infra/sbom-history/${{ env.TODAY }}/
          retention-days: 365  # Cold archive 1 year
