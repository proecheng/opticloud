name: e2e

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/auth-service/**'
      - 'apps/solver-orchestrator/**'
      - 'packages/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/auth-service/**'
      - 'apps/solver-orchestrator/**'
      - 'packages/**'
      - 'e2e/**'

env:
  CI: "true"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "18"
  UV_VERSION: "0.5.4"
  PNPM_VERSION: "9.12.0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opticloud
          POSTGRES_PASSWORD: opticloud_dev
          POSTGRES_DB: opticloud_dev
        options: >-
          --health-cmd "pg_isready -U opticloud -d opticloud_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # ===== Cache (R3 D4 fix — speed up CI) =====
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}

      # ===== Install deps =====
      - name: Install uv
        run: pip install uv==${{ env.UV_VERSION }}

      - name: Install Python deps
        run: uv sync --all-packages --extra dev

      - name: Install Node deps
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install Playwright Chromium
        run: pnpm -C e2e exec playwright install --with-deps chromium

      # ===== Apply DB schema =====
      - name: Apply schema
        env:
          PGPASSWORD: opticloud_dev
        run: |
          sudo apt-get install -y postgresql-client
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/01-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/02-solver-schema.sql

      # ===== Start services (background) =====
      - name: Start auth-service (background)
        env:
          DATABASE_URL: postgresql+asyncpg://opticloud:opticloud_dev@localhost:5432/opticloud_dev
          PYTHONPATH: packages/shared-py:apps/auth-service/src:packages/python-sdk/src
        run: |
          nohup uv run uvicorn auth_service.main:app --host 0.0.0.0 --port 8001 > auth-service.log 2>&1 &
          echo $! > auth-service.pid

      - name: Start solver-orchestrator (background)
        env:
          DATABASE_URL: postgresql+asyncpg://opticloud:opticloud_dev@localhost:5432/opticloud_dev
          PYTHONPATH: packages/shared-py:apps/solver-orchestrator/src:packages/python-sdk/src
        run: |
          nohup uv run uvicorn solver_orchestrator.main:app --host 0.0.0.0 --port 8002 > solver.log 2>&1 &
          echo $! > solver.pid

      - name: Build + start web (background)
        env:
          NEXT_PUBLIC_AUTH_SERVICE_URL: http://localhost:8001
          NEXT_PUBLIC_SOLVER_SERVICE_URL: http://localhost:8002
        run: |
          pnpm -C apps/web build
          nohup pnpm -C apps/web start > web.log 2>&1 &
          echo $! > web.pid

      # ===== Wait for readiness =====
      - name: Wait for all services
        run: npx --yes wait-on http://localhost:8001/healthz http://localhost:8002/healthz http://localhost:3000 --timeout 90000

      # ===== Run E2E =====
      - name: Run Playwright tests (chromium)
        run: pnpm -C e2e exec playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_AUTH_URL: http://localhost:8001
          PLAYWRIGHT_SOLVER_URL: http://localhost:8002

      # ===== Redact secrets (S2 fix) before upload =====
      - name: Redact secrets in artifacts
        if: always()
        run: bash e2e/scripts/redact-secrets.sh e2e/

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload Playwright test-results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7

      # ===== Cleanup E2E test data (R1-5 fix) =====
      - name: Cleanup E2E DB rows
        if: always()
        env:
          PGPASSWORD: opticloud_dev
        run: |
          psql -h localhost -U opticloud -d opticloud_dev -c "DELETE FROM users WHERE email LIKE 'e2e-%';"

      # ===== Service logs on failure (debugging) =====
      - name: Upload service logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            auth-service.log
            solver.log
            web.log
          retention-days: 7
