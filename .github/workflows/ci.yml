# OptiCloud CI Pipeline — Story 0.3 + C5 path-filter
# Constraint C5: CI must use path-based filtering (dorny/paths-filter)
# Goal: changing 1 service triggers only that service's tests (~3 min vs ~15 min full)

name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "18"
  UV_VERSION: "0.5.4"
  PNPM_VERSION: "9.12.0"

jobs:
  # ===== Path filter — determines which jobs to run =====
  changes:
    runs-on: ubuntu-latest
    outputs:
      shared_py: ${{ steps.filter.outputs.shared_py }}
      shared_ts: ${{ steps.filter.outputs.shared_ts }}
      outbox_relayer: ${{ steps.filter.outputs.outbox_relayer }}
      ui: ${{ steps.filter.outputs.ui }}
      python_sdk: ${{ steps.filter.outputs.python_sdk }}
      auth_service: ${{ steps.filter.outputs.auth_service }}
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      solver_orchestrator: ${{ steps.filter.outputs.solver_orchestrator }}
      billing_service: ${{ steps.filter.outputs.billing_service }}
      chat_service: ${{ steps.filter.outputs.chat_service }}
      critic_service: ${{ steps.filter.outputs.critic_service }}
      critic_calibration: ${{ steps.filter.outputs.critic_calibration }}
      sandbox_runner: ${{ steps.filter.outputs.sandbox_runner }}
      capability_registry: ${{ steps.filter.outputs.capability_registry }}
      repro_service: ${{ steps.filter.outputs.repro_service }}
      image_archival: ${{ steps.filter.outputs.image_archival }}
      image_archival_pipeline: ${{ steps.filter.outputs.image_archival_pipeline }}
      k8s_manifests: ${{ steps.filter.outputs.k8s_manifests }}
      chat_load_plan: ${{ steps.filter.outputs.chat_load_plan }}
      api_gateway_perf: ${{ steps.filter.outputs.api_gateway_perf }}
      traffic_replay: ${{ steps.filter.outputs.traffic_replay }}
      j3_incident_contract: ${{ steps.filter.outputs.j3_incident_contract }}
      sandbox_security_audit: ${{ steps.filter.outputs.sandbox_security_audit }}
      llm_router: ${{ steps.filter.outputs.llm_router }}
      gtm_toolkit: ${{ steps.filter.outputs.gtm_toolkit }}
      gurobi_benchmark: ${{ steps.filter.outputs.gurobi_benchmark }}
      contract_tests: ${{ steps.filter.outputs.contract_tests }}
      blue_green_deploy: ${{ steps.filter.outputs.blue_green_deploy }}
      aigc_filter: ${{ steps.filter.outputs.aigc_filter }}
      web: ${{ steps.filter.outputs.web }}
      ci_or_root: ${{ steps.filter.outputs.ci_or_root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # Shared packages trigger ALL services
            shared_py:
              - 'packages/shared-py/**'
              - 'pyproject.toml'
              - '.python-version'
            shared_ts:
              - 'packages/shared-ts/**'
            ui:
              - 'packages/ui/**'
            python_sdk:
              - 'packages/python-sdk/**'
            # Per-service: only its dir
            auth_service:
              - 'apps/auth-service/**'
              - 'infra/local-init/09-geo-anomaly-risk.sql'
              - 'infra/local-init/10-freeze-appeals.sql'
            billing_service:
              - 'apps/billing-service/**'
              - 'infra/local-init/03-billing-schema.sql'
              - 'infra/local-init/10-cost-attribution.sql'
            outbox_relayer:
              - 'apps/outbox-relayer/**'
              - 'infra/local-init/04-outbox-trigger.sql'
            api_gateway:
              - 'apps/api-gateway/**'
            solver_orchestrator:
              - 'apps/solver-orchestrator/**'
              - 'infra/local-init/02-solver-schema.sql'
              - 'infra/local-init/09-geo-anomaly-risk.sql'
              - 'infra/local-init/10-cost-attribution.sql'
            chat_service:
              - 'apps/chat-service/**'
              - 'apps/sandbox-runner/**'
              - 'packages/shared-py/aigc_filter/**'
              - 'packages/shared-py/opticloud_shared/llm_router/**'
              - 'packages/shared-py/opticloud_shared/__init__.py'
              - 'packages/shared-py/pyproject.toml'
              - 'tests/aigc/**'
            critic_service:
              - 'apps/critic-service/**'
            critic_calibration:
              - 'tools/critic_calibration/**'
              - 'docs/critic-annotation-sop.md'
              - 'apps/critic-service/config/critic-calibration.json'
              - 'tests/test_critic_calibration.py'
            sandbox_runner:
              - 'apps/sandbox-runner/**'
            capability_registry:
              - 'apps/capability-registry/**'
            repro_service:
              - 'apps/repro-service/**'
            image_archival:
              - 'infra/image-archival/**'
              - 'scripts/validate_image_archival_plan.py'
              - 'tests/test_image_archival_plan.py'
            image_archival_pipeline:
              - 'infra/image-archival/**'
              - 'tools/image_archival/**'
              - 'scripts/validate_image_archival_pipeline.py'
              - 'tests/test_image_archival_pipeline.py'
              - 'docs/runbooks/image-5y-archival-pipeline.md'
              - 'docs/runbooks/repro-image-restore.md'
              - 'reports/image-archival/**'
            k8s_manifests:
              - 'infra/k8s/**'
              - 'scripts/validate_k8s_network_policies.py'
              - 'tests/test_k8s_network_policies.py'
            chat_load_plan:
              - 'tools/chat_load/**'
              - 'scripts/validate_chat_load_plan.py'
              - 'tests/test_chat_load_plan.py'
              - 'docs/runbooks/chat-staging-load-test.md'
              - 'docs/runbooks/chat-single-node-baseline.md'
              - 'docs/runbooks/chat-incident-fallback.md'
              - 'reports/chat-load/**'
              - 'reports/chat-single-node/**'
              - 'reports/chat-incident-fallback/**'
            api_gateway_perf:
              - 'tools/api_gateway_perf/**'
              - 'scripts/validate_api_gateway_perf_plan.py'
              - 'tests/test_api_gateway_perf_plan.py'
              - 'docs/runbooks/api-gateway-perf-baseline.md'
              - 'reports/api-gateway-perf/**'
            traffic_replay:
              - 'tools/traffic_replay/**'
              - 'scripts/validate_traffic_replay_plan.py'
              - 'tests/test_traffic_replay_plan.py'
              - 'docs/runbooks/production-traffic-replay.md'
              - 'reports/prod-traffic-replay/**'
            j3_incident_contract:
              - 'tools/incidents/**'
              - 'scripts/validate_j3_incident_contract.py'
              - 'tests/test_j3_incident_contract.py'
              - 'docs/runbooks/j3-sre-incident-tier3.md'
              - 'reports/j3-sre-incident/**'
            sandbox_security_audit:
              - 'infra/sandbox-security/**'
              - 'scripts/validate_sandbox_security_audit.py'
              - 'tests/sandbox/security/**'
              - 'docs/runbooks/sandbox-security-audit.md'
              - 'reports/sandbox-security/**'
            llm_router:
              - 'packages/shared-py/opticloud_shared/llm_router/**'
              - 'packages/shared-py/opticloud_shared/__init__.py'
              - 'tools/llm_router/**'
              - 'scripts/validate_llm_router_contract.py'
              - 'tests/llm_router/**'
              - 'docs/runbooks/llm-provider-abstraction.md'
            gtm_toolkit:
              - 'docs/gtm/**'
              - 'docs/customer-faqs/**'
              - 'docs/enterprise-gtm-toolkit.md'
              - 'tools/gtm_toolkit/**'
              - 'scripts/validate_gtm_toolkit.py'
              - 'tests/test_gtm_toolkit.py'
              - 'apps/web/src/app/pricing/page.tsx'
              - 'apps/web/src/i18n/messages/zh-CN.json'
              - 'apps/web/src/i18n/messages/en-US.json'
            gurobi_benchmark:
              - 'docs/benchmarks/**'
              - 'docs/runbooks/gurobi-lp-benchmark.md'
              - 'tools/gurobi_benchmark/**'
              - 'scripts/validate_gurobi_benchmark.py'
              - 'tests/test_gurobi_benchmark.py'
              - 'reports/gurobi-benchmark/**'
            blue_green_deploy:
              - 'scripts/deploy/**'
              - 'scripts/validate_blue_green_deploy.py'
              - 'tests/test_blue_green_deploy.py'
              - 'docker-compose.blue.yml'
              - 'docker-compose.green.yml'
            aigc_filter:
              - 'packages/shared-py/aigc_filter/**'
              - 'packages/shared-py/opticloud_shared/__init__.py'
              - 'packages/shared-py/pyproject.toml'
              - 'tests/aigc/**'
              - 'scripts/report_aigc_filter_metrics.py'
            contract_tests:
              - 'tests/contract/**'
              - 'packages/shared-py/aigc_filter/**'
              - 'packages/shared-py/opticloud_shared/property_test_base/**'
              - 'packages/shared-py/tests/test_property_base_schemathesis_sample.py'
              - 'apps/auth-service/src/auth_service/**'
              - 'scripts/generate_openapi.py'
              - 'scripts/check_openapi_drift.py'
            web:
              - 'apps/web/**'
            # CI or root config — re-run everything
            ci_or_root:
              - '.github/workflows/**'
              - '.pre-commit-config.yaml'
              - 'docker-compose.yml'

  # ===== Lint + format (always run, fast) =====
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: pip install uv==${{ env.UV_VERSION }}
      - name: Install pre-commit
        run: uv tool install pre-commit
      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files --show-diff-on-failure

  # ===== Mypy strict (Story 0.5) — separate job so it has access to project deps =====
  mypy:
    needs: changes
    if: needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.python_sdk == 'true' || needs.changes.outputs.auth_service == 'true' || needs.changes.outputs.solver_orchestrator == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Run mypy
        run: uv run mypy apps packages

  # ===== Python: shared-py tests (cascade triggers many services) =====
  # Story 0.5b — property tests (Hypothesis + Schemathesis) require dev extras.
  shared-py-test:
    needs: changes
    if: needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - run: uv run pytest packages/shared-py/tests/ -v

  # ===== Python: python-sdk tests (FG1.3 error.locate() + parity) =====
  python-sdk-test:
    needs: changes
    if: needs.changes.outputs.python_sdk == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - run: uv run pytest packages/python-sdk/tests/ -v

  # ===== Python: per-service tests =====
  auth-service-test:
    needs: changes
    if: needs.changes.outputs.auth_service == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opticloud
          POSTGRES_PASSWORD: opticloud_dev  # pragma: allowlist secret
          POSTGRES_DB: opticloud_dev
        options: >-
          --health-cmd "pg_isready -U opticloud -d opticloud_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Apply schema
        env:
          PGPASSWORD: opticloud_dev  # pragma: allowlist secret
        run: |
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/01-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/03-billing-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/05-bucket-backfill.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/06-user-otps.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/07-risk-control.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/08-guardian-consent.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/09-geo-anomaly-risk.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/10-freeze-appeals.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://opticloud:opticloud_dev@localhost:5432/opticloud_dev  # pragma: allowlist secret
        run: uv run pytest apps/auth-service/tests/ -v

  # ===== billing-service tests (Story 5.A.0a) =====
  billing-service-test:
    needs: changes
    if: needs.changes.outputs.billing_service == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opticloud
          POSTGRES_PASSWORD: opticloud_dev  # pragma: allowlist secret
          POSTGRES_DB: opticloud_dev
        options: >-
          --health-cmd "pg_isready -U opticloud -d opticloud_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Apply schema
        env:
          PGPASSWORD: opticloud_dev  # pragma: allowlist secret
        run: |
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/01-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/03-billing-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/04-outbox-trigger.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/05-bucket-backfill.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/10-cost-attribution.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://opticloud:opticloud_dev@localhost:5432/opticloud_dev  # pragma: allowlist secret
        run: uv run pytest apps/billing-service/tests/ -v

  # ===== solver-orchestrator tests (Story 2.1 + 3.1 + 5.A.4 + 1.3) =====
  solver-orchestrator-test:
    needs: changes
    if: needs.changes.outputs.solver_orchestrator == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opticloud
          POSTGRES_PASSWORD: opticloud_dev  # pragma: allowlist secret
          POSTGRES_DB: opticloud_dev
        options: >-
          --health-cmd "pg_isready -U opticloud -d opticloud_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Apply schema
        env:
          PGPASSWORD: opticloud_dev  # pragma: allowlist secret
        run: |
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/01-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/02-solver-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/03-billing-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/05-bucket-backfill.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/07-risk-control.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/08-guardian-consent.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/09-geo-anomaly-risk.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/10-cost-attribution.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://opticloud:opticloud_dev@localhost:5432/opticloud_dev  # pragma: allowlist secret
        run: uv run pytest apps/solver-orchestrator/tests/ -v

  # ===== outbox-relayer tests (Story M2.1) =====
  outbox-relayer-test:
    needs: changes
    if: needs.changes.outputs.outbox_relayer == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opticloud
          POSTGRES_PASSWORD: opticloud_dev  # pragma: allowlist secret
          POSTGRES_DB: opticloud_dev
        options: >-
          --health-cmd "pg_isready -U opticloud -d opticloud_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Apply schema
        env:
          PGPASSWORD: opticloud_dev  # pragma: allowlist secret
        run: |
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/01-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/03-billing-schema.sql
          psql -h localhost -U opticloud -d opticloud_dev -f infra/local-init/04-outbox-trigger.sql
      - name: Run tests
        env:
          DATABASE_URL: postgresql://opticloud:opticloud_dev@localhost:5432/opticloud_dev  # pragma: allowlist secret
          REDIS_URL: redis://localhost:6379
        run: uv run pytest apps/outbox-relayer/tests/ -v

  # ===== chat-service tests (Story 4.A.1) =====
  chat-service-test:
    needs: changes
    if: needs.changes.outputs.chat_service == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - run: uv run pytest apps/chat-service/tests/ -v
        env:
          PYTHONPATH: apps/chat-service/src:apps/sandbox-runner/src

  # ===== Other service stubs (will populate as services come online) =====
  # api-gateway-test, ...

  # ===== sandbox-runner tests (Story M3.1) =====
  sandbox-runner-test:
    needs: changes
    if: needs.changes.outputs.sandbox_runner == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - run: uv run pytest apps/sandbox-runner/tests/ -v
        env:
          PYTHONPATH: apps/sandbox-runner/src

  # ===== Image archival prep validation (Story M3.0) =====
  image-archival-plan:
    needs: changes
    if: needs.changes.outputs.image_archival == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Validate archive plan
        run: uv run python scripts/validate_image_archival_plan.py infra/image-archival/archive-plan.json
      - name: Run archive plan tests
        run: uv run pytest tests/test_image_archival_plan.py -v

  # ===== Image 5y archival pipeline validation (Story M3.9) =====
  image-archival-pipeline-validation:
    needs: changes
    if: needs.changes.outputs.image_archival_pipeline == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Validate image archival pipeline contract
        run: uv run python scripts/validate_image_archival_pipeline.py
      - name: Validate real image archival evidence manifests when present
        run: |
          shopt -s globstar nullglob
          manifests=(reports/image-archival/**/evidence_manifest.json)
          for manifest in "${manifests[@]}"; do
            uv run python scripts/validate_image_archival_pipeline.py --evidence "$manifest"
          done
      - name: Run image archival pipeline tests
        run: uv run pytest tests/test_image_archival_pipeline.py -v

  # ===== K8s namespace / NetworkPolicy validation (Story M3.3a) =====
  k8s-manifest-validation:
    needs: changes
    if: needs.changes.outputs.k8s_manifests == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Validate production K8s policies
        run: uv run python scripts/validate_k8s_network_policies.py infra/k8s/production
      - name: Run K8s policy tests
        run: uv run pytest tests/test_k8s_network_policies.py -v

  # ===== Lean docker-compose blue/green validation (Story M3.3b) =====
  blue-green-deploy-validation:
    needs: changes
    if: needs.changes.outputs.blue_green_deploy == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
