          shopt -s globstar nullglob
          manifests=(reports/chat-incident-fallback/**/evidence_manifest.json)
          for manifest in "${manifests[@]}"; do
            uv run python scripts/validate_chat_load_plan.py --incident-fallback-evidence "$manifest"
          done
      - name: Run chat load plan tests
