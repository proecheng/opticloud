        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Run contract tests
        env:
          PYTHONPATH: apps/auth-service/src:packages/shared-py
        run: uv run pytest tests/contract -v

  # ===== TypeScript: web + ui + shared-ts typecheck =====
  ts-typecheck:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.shared_ts == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - run: pnpm install --frozen-lockfile
        continue-on-error: true
      - run: pnpm -r typecheck
        continue-on-error: true  # Allow until ts files populate

  # ===== OpenAPI drift check (P64 + Story 0.4) =====
  openapi-drift:
    needs: changes
    if: needs.changes.outputs.auth_service == 'true' || needs.changes.outputs.shared_py == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Check OpenAPI drift
        run: uv run python scripts/check_openapi_drift.py
        continue-on-error: true  # Allow until first commit of generated spec
