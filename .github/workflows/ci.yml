      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Validate blue/green deploy assets
        run: uv run python scripts/validate_blue_green_deploy.py
      - name: Run blue/green deploy tests
        run: uv run pytest tests/test_blue_green_deploy.py -v
      - name: Check deploy script syntax
        run: bash -n scripts/deploy/blue-green.sh

  # ===== Chat staging load-test plan validation (Story M3.6a) =====
  chat-load-plan-validation:
    needs: changes
    if: needs.changes.outputs.chat_load_plan == 'true' || needs.changes.outputs.ci_or_root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install uv==${{ env.UV_VERSION }}
      - run: uv sync --all-packages --extra dev
      - name: Validate chat load plan
        run: uv run python scripts/validate_chat_load_plan.py
      - name: Validate real chat load evidence manifests when present
        run: |
          shopt -s globstar nullglob
          manifests=(reports/chat-load/**/evidence_manifest.json)
          for manifest in "${manifests[@]}"; do
            uv run python scripts/validate_chat_load_plan.py --evidence "$manifest"
          done
      - name: Validate real chat single-node evidence manifests when present
        run: |
          shopt -s globstar nullglob
          manifests=(reports/chat-single-node/**/evidence_manifest.json)
          for manifest in "${manifests[@]}"; do
            uv run python scripts/validate_chat_load_plan.py --single-node-evidence "$manifest"
