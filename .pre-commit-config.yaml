# Pre-commit hooks (Story 0.5 + Story 0.5b 兼容)
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files

repos:
  # ----- 通用 -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        exclude: ^infra/local-init/
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ----- Python: ruff (lint + format) -----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ----- Python: mypy strict -----
  # NOTE: mypy intentionally NOT in pre-commit — its isolated venv can't see
  # project deps (sqlalchemy/fastapi/opentelemetry/...). Mypy runs as a separate
  # CI job (.github/workflows/ci.yml :: mypy) where `uv sync --all-packages --extra dev`
  # has installed everything. Locally: `uv run mypy apps packages`.

  # ----- Python: bandit (security scan) -----
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "bandit.yaml"]
        exclude: ^(tests/|scripts/)  # scripts/ uses subprocess by design (operator tooling)

  # ----- License check (CRG9 fix: GPL-3.0 limited-to ECOS only) -----
  - repo: local
    hooks:
      - id: license-check
        name: License check (allow MIT/Apache 2.0/BSD/EPL-2.0; GPL-3.0 limited-to ECOS)
        entry: python scripts/check_licenses.py
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|package\.json|pnpm-lock\.yaml|uv\.lock)$

  # ----- Secrets (基础；详细 secret 扫描走 GitGuardian / TruffleHog CI) -----
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
          # KeywordDetector + BasicAuthDetector flag every `sk-` + every
          # postgres://user:pass@... — too noisy for a dev-config-heavy repo.
          # AWS / JWT / Private Key / Base64 / Hex detectors still active.
          - "--disable-plugin"
          - "KeywordDetector"
          - "--disable-plugin"
          - "BasicAuthDetector"
          # Public chat-load prompt fixture SHA-256, not a secret.
          - "--exclude-secrets"
          - "57a47193517b19cca0983c5f00c17b246197c80620db9f87d17cdd16db79529c"
          # Public M3.6c incident fallback drill plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "fff65b0ea93792b34dcd185f94798677f4b48274e5fbd0fc0d395af7dc74fe94"
          # Public M3.6d API gateway performance baseline plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "946f35ad4cb7006acc5d4d2df46cab321965d6c2e783f652653ae06597fb764e"
          # Public M3.6e traffic replay capture fixture SHA-256, not a secret.
          - "--exclude-secrets"
          - "37b098c3e1a128088563f2d29062b1abe724a02f7c669a45c414bbf9dbcc9fc1"
          # Public M3.6e traffic replay plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "c40d27b3e2855d4634c84460d859351bae2fec6b2f92ca8badb5a6cd62136d6a"
          # Public M3.7 sandbox security audit AppArmor profile SHA-256, not a secret.
          - "--exclude-secrets"
          - "633480f0068a87628d8648132bc0d715340a92f07d1607bfd1211960c7c80f09"
          # Public M3.7 sandbox security attack scenario SHA-256, not a secret.
          - "--exclude-secrets"
          - "ab6b443ef63d6e6b510991400ce86dc142e3244dbc3ff4e787ad7cb521e29b90"
          # Public M3.7 sandbox security audit plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "48239539617b6c882db9558dee5465ac90f7f9e395b4ce52b41c35a8c42e0989"
          # Public M3.7 sandbox security hardening manifest SHA-256, not a secret.
          - "--exclude-secrets"
          - "231b6c16facab046ce1703f414930a28e02d939159d5047a81d6afbc31e803b5"
          # Public M3.7 sandbox security supply-chain policy SHA-256, not a secret.
          - "--exclude-secrets"
          - "e096ea9a05866b90380f86b9d2eec14a29848b7d65aa8b02e9534b8da41b513f"
          # Public M3.8 LLM router reference prompt fixture SHA-256, not a secret.
          - "--exclude-secrets"
          - "8caaadeec34c17bc08b71abab1394605f377943666f7197ce0a49d9b9cc08ca2"
          # Public M3.9 image archival archive plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "001ab7d9cd8f13294f8bd50a03f488dd25452be00c9bcb1fdccca20377cfd8a9"
          # Public M3.9 image archival pipeline plan SHA-256, not a secret.
          - "--exclude-secrets"
          - "22cdba80e918acf54a08057790d49f929a21f8fdced2b72b4437ae3bbcb355c9"
          # Public 5.A.0c Saga cross-epic fixture manifest SHA-256, not a secret.
          - "--exclude-secrets"
          - "6741adad1791c8f0108144a23af80e628b91ef5d80a88e99efb4b1bc928e2986"
        # pnpm-lock.yaml contains generated integrity hashes that trigger high-entropy false positives.
        exclude: ^(\.env\.example|infra/local-init/.*\.sql|.*\.stories\.tsx|pnpm-lock\.yaml)$
