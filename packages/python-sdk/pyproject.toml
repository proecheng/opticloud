[project]
name = "opticloud"
version = "0.0.1a1"
description = "OptiCloud Python SDK (Story 0.4 + FG1.3 + L1 error.locate())"
requires-python = ">=3.10,<3.14"  # alpha: support Py 3.10-3.13
authors = [{name = "OptiCloud Team"}]
license = {text = "Apache-2.0"}
readme = "README.md"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/opticloud"]
