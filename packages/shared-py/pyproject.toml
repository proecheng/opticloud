[project]
name = "opticloud-shared"
version = "0.0.1"
description = "OptiCloud shared Python utilities (schemas / cost_telemetry / aigc_filter / otel_setup / property_test_base)"
requires-python = ">=3.11,<3.13"
dependencies = [
  "pydantic>=2.7",
  "structlog>=24.1",
  "opentelemetry-api>=1.28",
  "opentelemetry-sdk>=1.28",
  "opentelemetry-instrumentation-fastapi>=0.49b0",
  "opentelemetry-exporter-otlp>=1.28",
  "prometheus-client>=0.21",
  "pyjwt[crypto]>=2.10",
  "cryptography>=43.0",
  "fastapi>=0.115",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "hypothesis>=6.115",
  "schemathesis>=3.36",
  "httpx>=0.27",
  "mypy>=1.13",
  "types-requests",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opticloud_shared"]
